name: Build Release Package

on:
  release:
    types:
      - published
  push:
    tags:
      - "v*"
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  build-release-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "7.4"
          tools: composer:v2

      - name: Install production dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist --no-progress

      - name: Verify runtime dependencies exist
        run: |
          set -euo pipefail
          test -f vendor/autoload_packages.php
          test -f vendor/autoload.php
          test -d vendor/league/oauth2-server
          test -d vendor/guzzlehttp/psr7
          test -d vendor/wordpress/mcp-adapter
          test -d vendor/wordpress/abilities-api

      - name: Build plugin zip
        run: |
          set -euo pipefail
          PLUGIN_SLUG="simple-wp-mcp-adapter-oauth"
          mkdir -p "dist/build/${PLUGIN_SLUG}" dist
          rsync -a --delete \
            --exclude-from=".distignore" \
            ./ "dist/build/${PLUGIN_SLUG}/"
          find "dist/build/${PLUGIN_SLUG}" -name ".DS_Store" -delete
          (
            cd dist/build
            zip -rq "../${PLUGIN_SLUG}.zip" "${PLUGIN_SLUG}"
          )

      - name: Verify packaged zip contents
        run: |
          set -euo pipefail
          PLUGIN_SLUG="simple-wp-mcp-adapter-oauth"
          unzip -l "dist/${PLUGIN_SLUG}.zip" | grep -q "vendor/autoload_packages.php"
          unzip -l "dist/${PLUGIN_SLUG}.zip" | grep -q "vendor/league/oauth2-server/"
          unzip -l "dist/${PLUGIN_SLUG}.zip" | grep -q "vendor/guzzlehttp/psr7/"
          unzip -l "dist/${PLUGIN_SLUG}.zip" | grep -q "vendor/wordpress/mcp-adapter/"
          unzip -l "dist/${PLUGIN_SLUG}.zip" | grep -q "vendor/wordpress/abilities-api/"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: simple-wp-mcp-adapter-oauth
          path: dist/simple-wp-mcp-adapter-oauth.zip

      - name: Upload zip to GitHub release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/simple-wp-mcp-adapter-oauth.zip
